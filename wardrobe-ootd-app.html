<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#fdf4f0">
<title>🌸 我的衣櫥 OOTD</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/dist/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{
  --bg:#fef8f5;--bg2:#fceee8;--bg3:#f8e0d8;
  --text:#3d2830;--text2:#9a6878;--text3:#d4a8b8;
  --border:rgba(210,140,160,0.22);--border2:rgba(200,120,148,0.32);
  --purple:#c070a8;--purple-light:#f8e0f0;--purple-dark:#904070;
  --pink:#d86888;--pink-light:#fde0ea;
  --teal:#78b898;--teal-light:#e8f6ee;
  --blue:#88a8c8;--blue-light:#eaf2fa;
  --danger:#c07078;--danger-light:#fde8ea;
  --radius:16px;--radius-sm:10px;--radius-pill:999px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:430px;margin:0 auto;
  background-image:radial-gradient(ellipse at 10% 10%,rgba(230,140,170,0.28) 0%,transparent 55%),
  radial-gradient(ellipse at 90% 30%,rgba(192,112,168,0.18) 0%,transparent 45%),
  radial-gradient(ellipse at 60% 80%,rgba(160,180,220,0.2) 0%,transparent 50%),
  radial-gradient(ellipse at 20% 90%,rgba(240,180,200,0.22) 0%,transparent 40%);
  background-attachment:fixed}
.app{padding-bottom:84px;min-height:100vh}
.topbar{padding:52px 16px 12px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:rgba(255,248,245,0.88);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);z-index:40;border-bottom:1px solid var(--border)}
.topbar-title{font-size:19px;font-weight:600;letter-spacing:-0.3px}
.topbar-right{display:flex;align-items:center;gap:8px}
.fab{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#d86888,#c070a8);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;box-shadow:0 4px 16px rgba(200,100,140,0.45);flex-shrink:0}
.icon-btn{width:36px;height:36px;border-radius:50%;background:var(--bg2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:16px;cursor:pointer;flex-shrink:0}
.nav{display:flex;border-top:1px solid var(--border);position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(255,248,245,0.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);z-index:50;padding:8px 0 max(env(safe-area-inset-bottom),8px)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 0;color:var(--text3);font-size:10px;border:none;background:none;transition:color .2s;font-family:inherit}
.nav-item.active{color:var(--purple)}
.nav-item i{font-size:22px}
.section{display:none;padding:0 16px}.section.active{display:block}

.card{background:rgba(255,248,245,0.85);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:12px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 9px;border-radius:var(--radius-pill);font-weight:500}
.bp{background:var(--pink-light);color:var(--pink)}
.bt{background:var(--teal-light);color:var(--teal)}
.bb{background:var(--blue-light);color:var(--blue)}
.bg2b{background:var(--bg2);color:var(--text2)}
.bpu{background:var(--purple-light);color:var(--purple-dark)}

.cloth-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:12px;margin-top:4px}
.cloth-card{background:rgba(255,248,245,0.9);border:1px solid var(--border);border-radius:var(--radius);padding:10px;cursor:pointer;transition:transform .1s;text-align:center;position:relative;-webkit-user-select:none;user-select:none}
.cloth-card:active{transform:scale(0.96)}
.cloth-photo{width:100%;aspect-ratio:1;border-radius:10px;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:44px;margin-bottom:8px;overflow:hidden;position:relative;pointer-events:none}
.cloth-photo img{width:100%;height:100%;object-fit:cover;display:block;pointer-events:none}
.worn-badge{position:absolute;top:6px;right:6px;background:var(--pink-light);color:var(--pink);font-size:10px;padding:2px 7px;border-radius:var(--radius-pill);pointer-events:none}
.cloth-name{font-size:13px;font-weight:500;color:var(--text);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;pointer-events:none}
.cloth-sub{font-size:11px;color:var(--text2);display:flex;align-items:center;justify-content:center;gap:3px;pointer-events:none}
.swatch-dot{width:10px;height:10px;border-radius:50%;border:0.5px solid rgba(0,0,0,.12);flex-shrink:0;display:inline-block;pointer-events:none}

.filter-scroll{display:flex;gap:7px;overflow-x:auto;padding:4px 0 10px;scrollbar-width:none}
.filter-scroll::-webkit-scrollbar{display:none}
.chip{white-space:nowrap;font-size:12px;padding:6px 14px;border:0.5px solid var(--border2);border-radius:var(--radius-pill);cursor:pointer;background:var(--bg);color:var(--text2);transition:all .15s;font-family:inherit}
.chip.active{background:linear-gradient(135deg,#d86888,#c070a8);color:#fff;border-color:transparent}

.ootd-slot{background:var(--bg2);border-radius:12px;padding:12px 8px;text-align:center;flex:1;min-width:0}
.stat2{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:12px}
.stat-box{background:var(--bg2);border-radius:var(--radius-sm);padding:14px;text-align:center;border:1px solid var(--border)}
.stat-n{font-size:26px;font-weight:600;color:var(--text)}
.stat-l{font-size:11px;color:var(--text2);margin-top:2px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.bar-label{font-size:12px;color:var(--text2);width:48px;flex-shrink:0}
.bar-track{flex:1;height:12px;background:var(--bg2);border-radius:6px;overflow:hidden}
.bar-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,#d86888,#c070a8)}
.bar-count{font-size:12px;font-weight:500;width:18px;text-align:right}

.modal-wrap{display:none;position:fixed;inset:0;background:rgba(60,20,30,.4);z-index:100;align-items:flex-end;backdrop-filter:blur(2px)}
.modal-wrap.show{display:flex}
.modal{background:rgba(255,248,245,0.97);border-radius:22px 22px 0 0;padding:20px 16px max(env(safe-area-inset-bottom,24px),24px);width:100%;max-height:92vh;overflow-y:auto;border-top:1px solid var(--border)}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:16px;font-weight:600;margin-bottom:16px}
.field{margin-bottom:14px}
.field-label{font-size:12px;color:var(--text2);margin-bottom:5px;font-weight:500}
.mrow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
input,select,textarea{font-size:14px;width:100%;padding:10px 12px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:rgba(255,250,248,0.9);color:var(--text);font-family:inherit;outline:none;-webkit-appearance:none;appearance:none}
input:focus,select:focus,textarea:focus{border-color:var(--purple)}
textarea{height:64px;resize:none}
.btn-main{width:100%;padding:14px;background:linear-gradient(135deg,#d87898,#c070a8,#88a8c8);color:#fff;border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;letter-spacing:0.3px;box-shadow:0 4px 16px rgba(200,100,140,0.3)}
.btn-main:disabled{opacity:0.5}
.btn-sub{width:100%;padding:12px;background:var(--bg2);color:var(--text);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px;cursor:pointer;margin-top:8px;font-family:inherit}
.btn-ig{width:100%;padding:13px;background:#E1306C;color:#fff;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-story{width:100%;padding:13px;background:#C13584;color:#fff;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-danger{width:100%;padding:12px;background:var(--danger-light);color:var(--danger);border:none;border-radius:var(--radius-sm);font-size:14px;cursor:pointer;margin-top:8px;font-family:inherit}
.btn-share{width:100%;padding:12px;background:linear-gradient(135deg,#78b898,#88a8c8);color:#fff;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:8px}

.photo-box{width:100%;aspect-ratio:1.5;border:1.5px dashed var(--border2);border-radius:var(--radius);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;background:var(--bg2);color:var(--text2);font-size:13px;overflow:hidden;position:relative;cursor:pointer}
.photo-box img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.photo-box input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}

.ig-caption{font-size:14px;color:var(--text);line-height:1.7;white-space:pre-wrap;word-break:break-all}
.ig-tags{font-size:13px;color:#378ADD;margin-top:10px;line-height:1.9;word-break:break-all}
.log-row{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:0.5px solid var(--border)}
.log-row:last-child{border-bottom:none}
.empty{text-align:center;color:var(--text3);font-size:14px;padding:2.5rem 0}
.palette-group-title{font-size:13px;font-weight:600;margin-bottom:8px;color:var(--text)}
.palette-section-title{font-size:15px;font-weight:700;color:var(--purple);margin:16px 0 10px;padding-bottom:6px;border-bottom:2px solid var(--purple-light)}
.color-grid{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px}
.color-tile{cursor:pointer;text-align:center;width:44px}
.color-tile-box{width:44px;height:44px;border-radius:11px;border:0.5px solid rgba(0,0,0,.1);transition:transform .15s}
.color-tile:active .color-tile-box{transform:scale(0.88)}
.color-tile-name{font-size:9px;color:var(--text2);margin-top:3px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;width:44px}

.friend-card{display:flex;align-items:center;gap:12px;padding:12px;background:var(--bg2);border-radius:var(--radius-sm);margin-bottom:8px;cursor:pointer}
.friend-avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#d86888,#c070a8);display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;flex-shrink:0;font-weight:600}
.share-link-box{background:var(--purple-light);border-radius:var(--radius-sm);padding:12px;margin:10px 0;word-break:break-all;font-size:12px;color:var(--purple-dark);border:1px solid rgba(192,112,168,0.2)}
.view-mode-banner{background:linear-gradient(135deg,#f8e0f0,#eaf2fa);border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:12px;font-size:13px;color:var(--purple-dark);display:flex;align-items:center;gap:8px;border:1px solid var(--border)}

/* Login screen */
.login-screen{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;max-width:430px;margin:0 auto;
  background-image:radial-gradient(ellipse at 10% 10%,rgba(230,140,170,0.28) 0%,transparent 55%),
  radial-gradient(ellipse at 90% 30%,rgba(192,112,168,0.18) 0%,transparent 45%),
  radial-gradient(ellipse at 60% 80%,rgba(160,180,220,0.2) 0%,transparent 50%)}
.login-logo{font-size:48px;margin-bottom:8px}
.login-title{font-size:22px;font-weight:700;margin-bottom:6px;color:var(--text)}
.login-sub{font-size:13px;color:var(--text2);margin-bottom:28px;text-align:center}
.login-box{width:100%;max-width:320px}
.login-tabs{display:flex;gap:8px;margin-bottom:16px;background:var(--bg2);border-radius:var(--radius-pill);padding:4px}
.login-tab{flex:1;text-align:center;padding:8px;font-size:13px;border-radius:var(--radius-pill);cursor:pointer;color:var(--text2);font-weight:500}
.login-tab.active{background:#fff;color:var(--purple-dark);box-shadow:0 2px 6px rgba(0,0,0,0.06)}
.login-error{font-size:12px;color:var(--danger);margin-top:6px;min-height:16px}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.4);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:rgba(60,30,40,0.92);color:#fff;padding:10px 20px;border-radius:var(--radius-pill);font-size:13px;z-index:300;max-width:90%;text-align:center;display:none}
</style>
</head>
<body>

<!-- 登入畫面 -->
<div class="login-screen" id="login-screen">
  <div class="login-logo">🌸</div>
  <div class="login-title">我的衣櫥 OOTD</div>
  <div class="login-sub">記錄衣物、智慧穿搭、共享給好友</div>
  <div class="login-box">
    <div class="login-tabs">
      <div class="login-tab active" id="tab-login" onclick="switchAuthTab('login')">登入</div>
      <div class="login-tab" id="tab-signup" onclick="switchAuthTab('signup')">註冊新帳號</div>
    </div>
    <div class="field"><div class="field-label">暱稱（帳號）</div><input id="auth-username" placeholder="例如：sasa" autocapitalize="off"></div>
    <div class="field"><div class="field-label">密碼</div><input id="auth-password" type="password" placeholder="至少 4 個字元"></div>
    <button class="btn-main" id="auth-submit-btn" onclick="handleAuth()">登入</button>
    <div class="login-error" id="auth-error"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="app" id="main-app" style="display:none">
  <div class="topbar">
    <span class="topbar-title" id="page-title">🌸 我的衣櫥</span>
    <div class="topbar-right">
      <button class="icon-btn" onclick="logout()" aria-label="登出"><i class="ti ti-logout"></i></button>
      <button class="fab" id="fab-add" onclick="openAdd()" aria-label="新增衣物"><i class="ti ti-plus"></i></button>
    </div>
  </div>

  <div class="section active" id="sec-wardrobe">
    <div id="view-mode-banner" style="display:none;margin-top:12px"></div>
    <div class="filter-scroll" id="cat-filter" style="margin-top:12px">
      <button class="chip active" onclick="filterCat('all',this)">全部</button>
      <button class="chip" onclick="filterCat('上衣',this)">上衣</button>
      <button class="chip" onclick="filterCat('外套',this)">外套</button>
      <button class="chip" onclick="filterCat('下著',this)">下著</button>
      <button class="chip" onclick="filterCat('裙子',this)">裙子</button>
      <button class="chip" onclick="filterCat('鞋子',this)">鞋子</button>
      <button class="chip" onclick="filterCat('配件',this)">配件</button>
    </div>
    <div class="cloth-grid" id="cloth-grid"><div style="grid-column:1/-1" class="empty">載入中...</div></div>
  </div>

  <div class="section" id="sec-ootd">
    <div class="card" style="margin-top:12px">
      <div style="font-size:14px;font-weight:600;margin-bottom:10px">今天的風格</div>
      <div class="filter-scroll" id="style-filter">
        <button class="chip active" onclick="setStyle('日常',this)">日常</button>
        <button class="chip" onclick="setStyle('正式',this)">正式</button>
        <button class="chip" onclick="setStyle('休閒',this)">休閒</button>
        <button class="chip" onclick="setStyle('約會',this)">約會</button>
        <button class="chip" onclick="setStyle('運動',this)">運動</button>
      </div>
      <div style="font-size:14px;font-weight:600;margin-bottom:10px">今天天氣</div>
      <div class="filter-scroll" id="weather-filter">
        <button class="chip active" onclick="setWeather('晴天',this)">☀️ 晴天</button>
        <button class="chip" onclick="setWeather('陰天',this)">☁️ 陰天</button>
        <button class="chip" onclick="setWeather('下雨',this)">🌧️ 下雨</button>
        <button class="chip" onclick="setWeather('涼爽',this)">🍃 涼爽</button>
        <button class="chip" onclick="setWeather('炎熱',this)">🔥 炎熱</button>
      </div>
      <button class="btn-main" onclick="genOOTD()" style="margin-top:4px"><i class="ti ti-sparkles"></i> 產生今日穿搭</button>
    </div>
    <div id="ootd-result" style="display:none">
      <div class="card">
        <div style="font-size:14px;font-weight:600;margin-bottom:10px">建議穿搭組合</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap" id="ootd-slots"></div>
        <div style="margin-top:12px;padding:11px;background:var(--purple-light);border-radius:var(--radius-sm);border:1px solid rgba(176,136,192,0.2)">
          <div style="font-size:12px;color:var(--purple-dark)" id="ootd-tip"></div>
        </div>
      </div>
      <div class="card">
        <div style="font-size:14px;font-weight:600;margin-bottom:10px">顏色搭配分析</div>
        <div id="color-analysis"></div>
      </div>
      <div class="card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
          <div style="font-size:14px;font-weight:600">IG 發文文案</div>
          <button onclick="copyCaption()" style="font-size:11px;padding:5px 11px;border-radius:var(--radius-pill);cursor:pointer;border:0.5px solid var(--border2);background:var(--bg);color:var(--text2);font-family:inherit"><i class="ti ti-copy"></i> 複製</button>
        </div>
        <div style="background:var(--bg2);border-radius:var(--radius-sm);padding:12px">
          <div class="ig-caption" id="ig-caption"></div>
          <div class="ig-tags" id="ig-tags"></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px">
          <button class="btn-ig" onclick="openIG()"><i class="ti ti-brand-instagram"></i> 發文</button>
          <button class="btn-story" onclick="openIGStory()"><i class="ti ti-player-play"></i> 限時動態</button>
        </div>
        <button class="btn-sub" onclick="saveOOTD()"><i class="ti ti-device-floppy"></i> 儲存今日穿搭記錄</button>
      </div>
    </div>
  </div>

  <div class="section" id="sec-palette">
    <div style="margin-top:12px" id="palette-main"></div>
    <div class="card" id="pair-result" style="display:none">
      <div style="font-size:14px;font-weight:600;margin-bottom:12px">搭配建議</div>
      <div id="pair-content"></div>
    </div>
  </div>

  <div class="section" id="sec-share">
    <div class="card" style="margin-top:12px">
      <div style="font-size:14px;font-weight:600;margin-bottom:4px">🔗 加好友、共享衣櫥</div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:12px">輸入朋友的帳號暱稱即可互看衣物、互相搭配</div>
      <div style="display:flex;gap:8px">
        <input id="friend-username-input" placeholder="輸入朋友的帳號暱稱">
        <button onclick="addFriend()" style="padding:10px 16px;background:var(--purple);color:#fff;border:none;border-radius:var(--radius-sm);font-size:13px;cursor:pointer;font-family:inherit;white-space:nowrap">加好友</button>
      </div>
    </div>
    <div class="card">
      <div style="font-size:14px;font-weight:600;margin-bottom:12px">我的好友</div>
      <div id="friend-list"><div class="empty">還沒有好友，加一個試試！</div></div>
    </div>
  </div>

  <div class="section" id="sec-stats">
    <div class="stat2" style="margin-top:12px">
      <div class="stat-box"><div class="stat-n" id="st-total">0</div><div class="stat-l">衣物總件數</div></div>
      <div class="stat-box"><div class="stat-n" id="st-logs">0</div><div class="stat-l">穿搭記錄</div></div>
      <div class="stat-box"><div class="stat-n" id="st-unworn">0</div><div class="stat-l">未曾穿過</div></div>
      <div class="stat-box"><div class="stat-n" id="st-fav">—</div><div class="stat-l">最愛單品</div></div>
    </div>
    <div class="card">
      <div style="font-size:14px;font-weight:600;margin-bottom:12px">類別分佈</div>
      <div id="cat-bars"></div>
    </div>
    <div class="card">
      <div style="font-size:14px;font-weight:600;margin-bottom:12px">穿搭記錄</div>
      <div id="log-list"><div class="empty">還沒有記錄</div></div>
    </div>
  </div>

// ===== 簡易密碼雜湊（避免明碼存放） =====
async function hashPass(pw){
  const enc=new TextEncoder().encode(pw+'wardrobe_salt_2026');
  const buf=await crypto.subtle.digest('SHA-256',enc);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

let authMode='login';
function switchAuthTab(mode){
  authMode=mode;
  document.getElementById('tab-login').classList.toggle('active',mode==='login');
  document.getElementById('tab-signup').classList.toggle('active',mode==='signup');
  document.getElementById('auth-submit-btn').textContent=mode==='login'?'登入':'註冊並開始使用';
  document.getElementById('auth-error').textContent='';
}

async function handleAuth(){
  const username=document.getElementById('auth-username').value.trim();
  const password=document.getElementById('auth-password').value;
  const errEl=document.getElementById('auth-error');
  const btn=document.getElementById('auth-submit-btn');
  errEl.textContent='';
  if(!username||username.length<2){errEl.textContent='暱稱至少需要 2 個字元';return;}
  if(!password||password.length<4){errEl.textContent='密碼至少需要 4 個字元';return;}

  btn.disabled=true;
  btn.innerHTML='<span class="spinner"></span>處理中...';
  try{
    const hashed=await hashPass(password);
    if(authMode==='signup'){
      const {data:existing}=await sb.from('users').select('id').eq('username',username).maybeSingle();
      if(existing){errEl.textContent='這個暱稱已經被使用了';btn.disabled=false;btn.textContent='註冊並開始使用';return;}
      const {data,error}=await sb.from('users').insert({username,password:hashed}).select().single();
      if(error)throw error;
      currentUser=data;
    } else {
      const {data,error}=await sb.from('users').select('*').eq('username',username).maybeSingle();
      if(error)throw error;
      if(!data||data.password!==hashed){errEl.textContent='帳號或密碼錯誤';btn.disabled=false;btn.textContent='登入';return;}
      currentUser=data;
    }
    localStorage.setItem('wardrobe_uid',currentUser.id);
    localStorage.setItem('wardrobe_uname',currentUser.username);
    await enterApp();
  }catch(e){
    console.error(e);
    errEl.textContent='連線發生問題，請稍後再試';
    btn.disabled=false;
    btn.textContent=authMode==='login'?'登入':'註冊並開始使用';
  }
}

  localStorage.removeItem('wardrobe_uid');

function handlePhoto(e){
  const file=e.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      const canvas=document.createElement('canvas');
      const MAX=400; // 較小尺寸，500件也存得下
      let w=img.width,h=img.height;
      if(w>h){if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}}
      else{if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}}
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      pendingPhoto=canvas.toDataURL('image/jpeg',0.6);
      const pb=document.getElementById('photo-box');
      pb.innerHTML=`<img src="${pendingPhoto}" alt="預覽"><input type="file" accept="image/*" onchange="handlePhoto(event)" style="position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%">`;
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}

function getActiveClothes(){return isViewMode?viewClothes:clothes;}

function genOOTD(){
  const src=getActiveClothes();
  if(!src.length){alert('請先新增衣物！');return;}
  const catMap={日常:['上衣','下著','鞋子'],正式:['上衣','外套','下著','鞋子'],
    休閒:['上衣','下著','鞋子'],約會:['上衣','裙子','鞋子','配件'],運動:['上衣','下著','鞋子']};
  const cats=catMap[curStyle]||['上衣','下著','鞋子'];
  const picked=[];
  cats.forEach(cat=>{
    const pool=src.filter(c=>c.cat===cat);
    if(pool.length)picked.push(pool[Math.floor(Math.random()*pool.length)]);
  });
  if(!picked.length){alert('衣物類別不足！');return;}
  lastOOTD=picked;

  document.getElementById('ootd-slots').innerHTML=picked.map(c=>`
    <div class="ootd-slot">
      <div style="width:56px;height:56px;border-radius:10px;margin:0 auto 5px;background:var(--bg);display:flex;align-items:center;justify-content:center;overflow:hidden">
        ${c.photo?`<img src="${c.photo}" style="width:100%;height:100%;object-fit:cover" alt="${c.name}">`:`<span style="font-size:32px">${EMOJI[c.cat]||'👚'}</span>`}
      </div>
      <div style="font-size:10px;color:var(--text2)">${c.cat}</div>
      <div style="font-size:11px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${c.name}</div>
    </div>`).join('');

  const ST={日常:'輕鬆舒適，適合日常外出',正式:'俐落有型，適合商務場合',休閒:'自在隨性，適合朋友聚會',約會:'甜美精緻，讓人印象深刻',運動:'機能活力，方便活動'};
  const WT={下雨:'☔ 記得帶傘，選深色防水材質',炎熱:'🌡️ 透氣材質優先，淺色更涼爽',涼爽:'🍃 可嘗試薄外套疊穿',晴天:'',陰天:''};
  document.getElementById('ootd-tip').innerHTML=`✨ ${ST[curStyle]}${WT[curWeather]?'　'+WT[curWeather]:''}`;

  const colors=picked.filter(c=>c.color&&c.colorHex);
  let cHTML='';
  if(colors.length){
    cHTML=`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">
      ${colors.map(c=>`<div style="display:flex;align-items:center;gap:5px"><span style="width:20px;height:20px;border-radius:6px;background:${c.colorHex};display:block;border:0.5px solid rgba(0,0,0,.12)"></span><span style="font-size:12px">${c.color}</span></div>`).join('')}
    </div>`;
    const pairs=(PAIRS[colors[0].color]||[]).slice(0,4);
    if(pairs.length){
      cHTML+=`<div style="font-size:12px;color:var(--text2);margin-bottom:8px">以「${colors[0].color}」為主色，推薦搭配：</div>
      <div style="display:flex;gap:7px;flex-wrap:wrap">
        ${pairs.map(p=>`<div style="display:flex;align-items:center;gap:4px;padding:5px 10px;background:var(--bg2);border-radius:var(--radius-pill)"><span style="width:12px;height:12px;border-radius:4px;background:${hexOf(p)};display:block;border:0.5px solid rgba(0,0,0,.1)"></span><span style="font-size:12px">${p}</span></div>`).join('')}
      </div>`;
    }
  } else cHTML='<div style="font-size:13px;color:var(--text2)">新增衣物時選顏色，就能獲得配色建議 🎨</div>';
  document.getElementById('color-analysis').innerHTML=cHTML;

  const items=picked.map(c=>c.name).join(' + ');
  const caption=`今日穿搭 ✨\n\n${items}\n\n風格：${curStyle}\n天氣：${curWeather}\n\n穿搭是表達自己的方式 💕`;
  const tags=`#OOTD #穿搭日記 #今日穿搭 #${curStyle}風 #衣櫥分享 #穿搭記錄 #台灣穿搭 #自媒體穿搭 #ootd台灣`;
  lastCaption=caption+'\n\n'+tags;
  document.getElementById('ig-caption').textContent=caption;
  document.getElementById('ig-tags').textContent=tags;
  document.getElementById('ootd-result').style.display='block';
  setTimeout(()=>document.getElementById('ootd-result').scrollIntoView({behavior:'smooth'}),100);
}

function copyCaption(){
  if(!lastCaption)return;
  const fb=()=>{const t=document.createElement('textarea');t.value=lastCaption;t.style.cssText='position:fixed;opacity:0';document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);toast('✅ 文案已複製！');};
  navigator.clipboard?navigator.clipboard.writeText(lastCaption).then(()=>toast('✅ 文案已複製！去 IG 貼上發文吧 🎉')).catch(fb):fb();
}

async function saveOOTD(){
  if(!lastOOTD||!lastOOTD.length)return;
  try{
    if(!isViewMode){
      const today=new Date().toLocaleDateString('zh-TW');
      for(const c of lastOOTD){
        const newCount=(c.wornCount||0)+1;
        await sb.from('clothes').update({worn_count:newCount,last_worn:today}).eq('id',c.id);
        c.wornCount=newCount;c.lastWorn=today;
      }
    }
    const items=lastOOTD.map(c=>({name:c.name,emoji:EMOJI[c.cat]||'👚',color:c.color}));
    const entry={user_id:currentUser.id,date:new Date().toLocaleDateString('zh-TW'),style:curStyle,weather:curWeather,items};
    await sb.from('logs').insert(entry);
    logs.unshift(entry);
    toast('✅ 今日穿搭記錄已儲存！');
  }catch(e){console.error(e);alert('儲存失敗，請再試一次');}
}

async function addFriend(){
  const uname=document.getElementById('friend-username-input').value.trim();
  if(!uname){alert('請輸入朋友的帳號暱稱');return;}
  if(uname===currentUser.username){alert('不能加自己好友喔 😅');return;}
  try{
    const {data:friendUser}=await sb.from('users').select('id,username').eq('username',uname).maybeSingle();
    if(!friendUser){alert('找不到這個帳號，請確認暱稱是否正確');return;}
    const {data:existing}=await sb.from('friends').select('id').eq('user_id',currentUser.id).eq('friend_username',uname).maybeSingle();
    if(existing){alert('已經是好友了！');return;}
    const {data,error}=await sb.from('friends').insert({user_id:currentUser.id,friend_username:uname}).select().single();
    if(error)throw error;
    friends.push(data);
    document.getElementById('friend-username-input').value='';
    renderFriendList();
    toast('✅ 已加「'+uname+'」為好友！');
